name: Generate pacman animation

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write  # Burası önemli
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # Önce dist klasörünü garantiye alalım veya aksiyonun kendi dokümantasyonuna göre çıktı yerini netleştirelim
      - name: generate pacman-contribution-graph.svg
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: "beratkaratas53" # Burayı küçük/büyük nasıl çalışıyorsa öyle sabitleyin

      - name: push pacman-contribution-graph.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: .
          repo: BeratKARATAS53/BeratKARATAS53 # Repo yolunu tam olarak buraya tanımlayın
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
