name: Generate pacman animation

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # Klasör yapısının ve dosya yollarının action tarafından doğru okunması için reposunu çekiyoruz
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: generate pacman-contribution-graph.svg
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
          # Not: Bu action varsayılan olarak çıktıyı projenin ana dizinine "pacman-contribution-graph.svg" adıyla atar.

      # Dosyayı manuel olarak dist klasörüne taşıyalım ki alttaki adım kör düğüm olmasın
      - name: Move SVG to dist directory
        run: |
          mkdir -p dist
          mv pacman-contribution-graph.svg dist/pacman-contribution-graph.svg

      - name: push pacman-contribution-graph.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist # Artık dist klasörünün içi dolu, Git hata vermeden push edecektir.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
