name: Generate pacman animation

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write  # Burası önemli
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # Önce dist klasörünü garantiye alalım veya aksiyonun kendi dokümantasyonuna göre çıktı yerini netleştirelim
      - name: generate pacman-contribution-graph.svg
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
          # Not: Eğer bu action çıktı klasörü parametresi alıyorsa (örn: output_dir: dist), buraya eklemelisin.
          # Eğer direkt ana dizine çıkarıyorsa alt adımdaki build_dir'i değiştireceğiz.

      - name: push pacman-contribution-graph.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: . # Eğer dist içine değil de ana dizine kaydediyorsa '.' yapmalısın
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
